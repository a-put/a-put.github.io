theme: jekyll-theme-minimal
title: Anton Putintsev's homepage
description: Blog by Anton Putintsev. Bookmark this to keep an eye on my project updates!
avatar: /assets/img/photo.jpg
lang: en

# protocol & hostname for your site (it does not end with a '/')
url: https://a-put.github.io

author:
  name: Anton Putintsev
  # sets the `author.url` property. helps Google to disambiguate the correct author of articles
  url: https://github.com/a-put




github:
  username: a-put

#twitter:
#  username: cgoldberg

social:
  # displayed as the default author of the posts and the copyright owner in the footer
  name: Anton Putintsev
  #email: example@domain.com
  links:
    # first element serves as the copyright owner's link
    - https://github.com/a-put
    - https://www.linkedin.com/in/antonputintsev
    # uncomment below to add more social links
    # - https://www.facebook.com/username
    # - https://twitter.com/username

toc: false

#comments:
  # global switch for the post-comment system. empty means disabled.
  #provider: disqus # [disqus | utterances | giscus]
  # provider options are as follows:
  #› https://disqus.com/
  #disqus:
  #  shortname: cgoldberg
  #› https://utteranc.es
  #utterances:
  #  repo: # <gh-username>/<repo>
  #  issue_term: # < url | pathname | title | ...>
  #› https://giscus.app
  #giscus:
  #  repo: # <gh-username>/<repo>
  #  repo_id:
  #  category:
  #  category_id:
  #  mapping: # optional, default to 'pathname'
  #  strict: # optional, default to '0'
  #  input_position: # optional, default to 'bottom'
  #  lang: # optional, default to the value of `site.lang`
  #  reactions_enabled: # optional, default to the value of `1`

# self-hosted static assets (optional) › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: false # boolean, empty means false
    # specify the Jekyll environment, empty means both
    # only works if `assets.self_host.enabled` is 'true'
    env: # [development | production]

#pwa:
#  enabled: true # The option for PWA feature (installable)
#  cache:
#    enabled: true # The option for PWA offline cache
#    # paths defined here will be excluded from the PWA cache.
#    # usually its value is the `baseurl` of another website that
#    # shares the same domain name as the current website.
#    deny_paths:
#      # - "/example"  # URLs match `<SITE_URL>/example/*` will not be cached by the PWA

paginate: 10

# base URL of your site
baseurl: ""

# default site-wide value for all pages
defaults:
  - scope:
      path: "" # empty string means all files
    values:
      seo_description_max_words: 200

# ------------ following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - rollup.config.js
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    tag: tag
    category: category
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
